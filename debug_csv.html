<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug CSV</title>
<style>body{font-family:monospace;font-size:11px;padding:12px;background:#f5f5f5}.sheet{background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px;margin-bottom:14px}.name{font-weight:bold;font-size:13px;color:#185FA5;margin-bottom:6px}.row{padding:2px 0;border-bottom:1px solid #f0f0f0;word-break:break-all}</style>
</head>
<body>
<h2 style="font-size:14px;margin-bottom:12px">Debug: primeras 6 filas de cada hoja (raw JSON)</h2>
<div id="out">Cargando...</div>
<script>
var BASE='https://docs.google.com/spreadsheets/d/e/2PACX-1vRUE7lN4X9Y9TOU_5vKD8dBy5LYhPedJYvN_dLZ-RCMB0PXPROLJqcxuHO-Yb4CApk23NFD77Jf_8u8/pub?output=csv';
var SHEETS=[
  {name:'WS-COSTOS',gid:'1169477995'},
  {name:'WS-VIP',gid:'2103310165'},
  {name:'GUILLE GAMES',gid:'221847934'},
  {name:'TRONADOR',gid:'1291580792'},
  {name:'LALO',gid:'376933543'},
  {name:'MATIAS BELGRANO',gid:'457070983'},
  {name:'GASTON TOMY',gid:'1697227894'},
  {name:'ALEJO',gid:'1580662582'},
  {name:'LUCHO PILAR',gid:'1980722139'},
  {name:'SERVICELL',gid:'125678359'},
  {name:'MAZZEO',gid:'803403481'},
  {name:'SEBASTIAN BELGRANO',gid:'1798307347'},
];
async function run(){
  var out=document.getElementById('out');out.innerHTML='';
  for(var s of SHEETS){
    var div=document.createElement('div');div.className='sheet';
    var html='<div class="name">'+s.name+'</div>';
    try{
      var r=await fetch(BASE.replace('output=csv','output=csv&gid='+s.gid));
      var txt=await r.text();
      var lines=txt.split('\n').slice(0,6);
      lines.forEach(function(l,i){
        html+='<div class="row">['+i+'] '+JSON.stringify(l)+'</div>';
      });
    }catch(e){html+='<div class="row">ERROR: '+e.message+'</div>';}
    div.innerHTML=html;out.appendChild(div);
  }
}
run();
</script>
</body>
</html>
